---
# Default TLS certificate: the 10-year self-signed wildcard generated by
# tls/apply.sh (ADR-011). /certs is /srv/homelab/secrets/tls, mounted
# read-only in compose.yaml. Every websecure router serves this cert;
# no ACME, no per-router TLS config.

tls:
  stores:
    default:
      defaultCertificate:
        certFile: /certs/wildcard.crt
        keyFile: /certs/wildcard.key
